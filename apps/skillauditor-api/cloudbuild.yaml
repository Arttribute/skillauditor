steps:
  # Install deps, build workspace packages (if any), build API, create standalone deploy bundle
  - name: node:22
    dir: "."
    entrypoint: bash
    args:
      - "-c"
      - |
        set -e
        corepack enable pnpm
        corepack prepare pnpm@10.12.4 --activate
        pnpm install --no-frozen-lockfile
        # Build shared packages first (no-op until packages/ are added)
        pnpm --filter './packages/*' run build || true
        pnpm --filter skillauditor-api run build
        pnpm deploy --filter skillauditor-api --prod --legacy apps/skillauditor-api/standalone
        cp -r apps/skillauditor-api/dist apps/skillauditor-api/standalone/dist

  - name: "gcr.io/cloud-builders/docker"
    dir: "./apps/skillauditor-api"
    args:
      - build
      - "-t"
      - "europe-west1-docker.pkg.dev/$PROJECT_ID/skillauditor/skillauditor-api:$SHORT_SHA"
      - "-f"
      - Dockerfile
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - tag
      - "europe-west1-docker.pkg.dev/$PROJECT_ID/skillauditor/skillauditor-api:$SHORT_SHA"
      - "europe-west1-docker.pkg.dev/$PROJECT_ID/skillauditor/skillauditor-api:prod"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "europe-west1-docker.pkg.dev/$PROJECT_ID/skillauditor/skillauditor-api"
      - "--all-tags"

  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - skillauditor-api-prod
      - --region=europe-west1
      - --platform=managed
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/skillauditor/skillauditor-api:prod
      - --allow-unauthenticated
    timeout: 1800s

options:
  logging: CLOUD_LOGGING_ONLY
